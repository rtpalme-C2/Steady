<style>
  :root {
    --forest-deep:   #1F3329;
    --forest-mid:    #2D4A3A;
    --forest-light:  #4A7A5E;
    --parchment:     #F0EADA;
    --parchment-dim: #E2D9C8;
    --amber:         #D4B06A;
    --amber-light:   #E8C97E;
    --amber-dim:     #A8883E;
    --text-primary:  #1A2B22;
    --text-secondary:#3D5A48;
    --text-muted:    #6B8F79;
    --text-on-dark:  #F0EADA;
    --text-dim:      #C8BEA8;
    --success:       #4A7A5E;
    --warn:          #B85C3A;
    --warn-light:    #E8705A;
    --radius:        10px;
    --radius-sm:     6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--parchment);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--forest-deep);
    position: relative;
    overflow: hidden;
    padding: 0 0 0 0;
  }

  .header-svg {
    display: block;
    width: 100%;
    height: 110px;
  }

  .header-content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    padding: 0 24px;
    gap: 20px;
  }

  .header-icon {
    width: 54px;
    height: 54px;
    border-radius: 12px;
    flex-shrink: 0;
  }

  .header-text {
    display: flex;
    flex-direction: column;
    gap: 2px;

<script>
// ── STORAGE ──
const STORAGE_KEY       = 'steady-v1';
const SHOTS_STORAGE_KEY = 'steady-shots-v1';

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function loadShots() {
  try { return JSON.parse(localStorage.getItem(SHOTS_STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveShots(shots) {
  localStorage.setItem(SHOTS_STORAGE_KEY, JSON.stringify(shots));
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── DATE UTILS ──
function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}`;
}

function nextSunday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 7 : 7 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function thisSunday() {
  const d = new Date();
  const day = d.getDay();
  const diff = 0 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function isSunday() {
  return new Date().getDay() === 0;
}

// ── STATS ──
function computeStats(entries) {
  if (!entries.length) return null;
  const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
  const first  = sorted[0].weight;
  const last   = sorted[sorted.length - 1].weight;

  // weekly delta: compare most recent two entries
  let weekDelta = null;
  if (sorted.length >= 2) {
    weekDelta = last - sorted[sorted.length - 2].weight;
  }

  // total lost
  const totalLost = first - last;

  // avg per week
  let avgPerWeek = null;
  if (sorted.length >= 2) {
    const firstDate = new Date(sorted[0].date);
    const lastDate  = new Date(sorted[sorted.length-1].date);
    const weeks = (lastDate - firstDate) / (7 * 24 * 60 * 60 * 1000);
    avgPerWeek = weeks > 0 ? totalLost / weeks : null;
  }

  // mood: most recent + 3-entry trend
  const moodScale = { happy: 2, neutral: 1, sad: 0 };
  const withMood = sorted.filter(e => e.mood);
  let latestMood = null;
  let moodTrend  = null;
  if (withMood.length >= 1) {
    latestMood = withMood[withMood.length - 1].mood;
  }
  if (withMood.length >= 3) {
    const last3 = withMood.slice(-3).map(e => moodScale[e.mood]);
    if (last3[2] > last3[0])      moodTrend = 'up';
    else if (last3[2] < last3[0]) moodTrend = 'down';
    else                           moodTrend = 'flat';
  }

  return { current: last, weekDelta, totalLost, avgPerWeek, latestMood, moodTrend };
}

function renderStats(entries) {
  const stats = computeStats(entries);

  const elCurrent = document.getElementById('stat-current');
  const elDelta   = document.getElementById('stat-delta');
  const elTotal   = document.getElementById('stat-total');
  const elAvg     = document.getElementById('stat-avg');
  const elMood    = document.getElementById('stat-mood');

  if (!stats) {
    [elCurrent, elDelta, elTotal, elAvg, elMood].forEach(el => {
      el.textContent = '—';
      el.className = 'stat-value neutral';
    });
    return;
  }

  elCurrent.textContent = stats.current.toFixed(1);
  elCurrent.className = 'stat-value';

  if (stats.weekDelta !== null) {
    const sign = stats.weekDelta < 0 ? '−' : stats.weekDelta > 0 ? '+' : '';
    elDelta.textContent = sign + Math.abs(stats.weekDelta).toFixed(1);
    elDelta.className = 'stat-value ' + (stats.weekDelta < 0 ? 'down' : stats.weekDelta > 0 ? 'up' : 'neutral');
  } else {
    elDelta.textContent = '—';
    elDelta.className = 'stat-value neutral';
  }

  if (stats.totalLost > 0) {
    elTotal.textContent = '−' + stats.totalLost.toFixed(1);
    elTotal.className = 'stat-value down';
  } else if (stats.totalLost < 0) {
    elTotal.textContent = '+' + Math.abs(stats.totalLost).toFixed(1);
    elTotal.className = 'stat-value up';
  } else {
    elTotal.textContent = '0.0';
    elTotal.className = 'stat-value neutral';
  }

  if (stats.avgPerWeek !== null) {
    const sign = stats.avgPerWeek > 0 ? '−' : '+';
    elAvg.textContent = sign + Math.abs(stats.avgPerWeek).toFixed(1);
    elAvg.className = 'stat-value ' + (stats.avgPerWeek > 0 ? 'down' : 'up');
  } else {
    elAvg.textContent = '—';
    elAvg.className = 'stat-value neutral';
  }

  if (stats.latestMood) {
    const moodEmoji = stats.latestMood === 'happy' ? '😊' : stats.latestMood === 'neutral' ? '😐' : '😔';
    const trendArrow = stats.moodTrend === 'up' ? ' ↑' : stats.moodTrend === 'down' ? ' ↓' : '';
    elMood.textContent = moodEmoji + trendArrow;
    elMood.className = 'stat-value ' + (stats.moodTrend === 'up' ? 'down' : stats.moodTrend === 'down' ? 'up' : 'neutral');
    elMood.style.fontSize = '18px';
  } else {
    elMood.textContent = '—';
    elMood.className = 'stat-value neutral';
    elMood.style.fontSize = '';
  }
}

// ── CHART ──
function renderChart(entries) {
  const svg   = document.getElementById('trend-chart');
  const empty = document.getElementById('chart-empty');

  if (entries.length < 2) {
    svg.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  svg.style.display = 'block';
  empty.style.display = 'none';

  const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
  const W = svg.parentElement.offsetWidth - 32;
  const H = 136;
  const PAD = { top: 12, right: 12, bottom: 36, left: 36 };
  const iW  = W - PAD.left - PAD.right;
  const iH  = H - PAD.top  - PAD.bottom;

  const weights = sorted.map(e => e.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;

  const xScale = i => PAD.left + (i / (sorted.length - 1)) * iW;
  const yScale = w => PAD.top  + iH - ((w - minW) / (maxW - minW)) * iH;

  const pts = sorted.map((e, i) => [xScale(i), yScale(e.weight)]);

  // build path
  const linePath  = pts.map((p,i) => (i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const areaPath  = linePath + ` L${pts[pts.length-1][0]},${PAD.top+iH} L${pts[0][0]},${PAD.top+iH} Z`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  svg.innerHTML = `
    <defs>
      <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#4A7A5E" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#4A7A5E" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <!-- Y axis labels -->
    ${[0, 0.5, 1].map(t => {
      const w = minW + t * (maxW - minW);
      const y = yScale(w);
      return `<text x="${PAD.left - 6}" y="${y + 4}" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#6B8F79" opacity="0.7">${w.toFixed(0)}</text>`;
    }).join('')}
    <!-- Grid lines -->
    ${[0, 0.5, 1].map(t => {
      const y = yScale(minW + t * (maxW - minW));
      return `<line x1="${PAD.left}" y1="${y}" x2="${PAD.left + iW}" y2="${y}" stroke="#E2D9C8" stroke-width="0.8"/>`;
    }).join('')}
    <!-- Area fill -->
    <path d="${areaPath}" fill="url(#area-grad)"/>
    <!-- Line -->
    <path d="${linePath}" stroke="#4A7A5E" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dots + amber waypoint on last + mood indicators -->
    ${pts.map((p, i) => {
      const isLast = i === pts.length - 1;
      const mood = sorted[i].mood;
      const moodColor = mood === 'happy' ? '#4A9E70' : mood === 'sad' ? '#B85C3A' : mood === 'neutral' ? '#D4B06A' : null;
      const dot = isLast
        ? `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#D4B06A" stroke="white" stroke-width="1.5"/>`
        : `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="#4A7A5E" opacity="0.6"/>`;
      const moodDot = moodColor
        ? `<circle cx="${p[0]}" cy="${PAD.top + iH + 8}" r="3.5" fill="${moodColor}" opacity="0.75"/>`
        : '';
      return dot + moodDot;
    }).join('')}
    <!-- X axis date labels (first and last) -->
    <text x="${pts[0][0]}" y="${H - 4}" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#6B8F79" opacity="0.7">${formatDate(sorted[0].date)}</text>
    <text x="${pts[pts.length-1][0]}" y="${H - 4}" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#D4B06A" opacity="0.9">${formatDate(sorted[sorted.length-1].date)}</text>
  `;
}

// ── HISTORY ──
function renderHistory(entries) {
  const container = document.getElementById('history-list');
  if (!entries.length) {
    container.innerHTML = '<div class="history-empty">No weigh-ins logged yet</div>';
    return;
  }

  const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));
  const byDate = [...entries].sort((a,b) => a.date.localeCompare(b.date));

  container.innerHTML = sorted.map((entry, idx) => {
    // find previous entry in chronological order
    const chronIdx = byDate.findIndex(e => e.date === entry.date && e.weight === entry.weight);
    const prev = chronIdx > 0 ? byDate[chronIdx - 1] : null;
    const delta = prev ? entry.weight - prev.weight : null;

    let deltaStr = '—';
    let deltaClass = 'flat';
    if (delta !== null) {
      if (delta < 0) { deltaStr = '−' + Math.abs(delta).toFixed(1); deltaClass = 'down'; }
      else if (delta > 0) { deltaStr = '+' + delta.toFixed(1); deltaClass = 'up'; }
      else { deltaStr = '±0.0'; deltaClass = 'flat'; }
    }

    const moodEmoji = entry.mood === 'happy' ? '😊' : entry.mood === 'neutral' ? '😐' : entry.mood === 'sad' ? '😔' : '';

    return `
      <div class="history-row">
        <span class="history-date">${formatDate(entry.date)}</span>
        <span class="history-weight">${entry.weight.toFixed(1)}</span>
        <span class="history-delta ${deltaClass}">${deltaStr}</span>
        <span class="history-mood">${moodEmoji}</span>
        <span class="history-note">${entry.note || ''}</span>
        <button class="btn-delete" data-date="${entry.date}" data-weight="${entry.weight}" title="Delete">×</button>
      </div>
    `;
  }).join('');

  // delete handlers
  container.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', () => {
      const date   = btn.dataset.date;
      const weight = parseFloat(btn.dataset.weight);
      let entries  = loadEntries();
      const idx    = entries.findIndex(e => e.date === date && e.weight === weight);
      if (idx > -1) {
        entries.splice(idx, 1);
        saveEntries(entries);
        renderAll();
        showToast('Entry deleted');
      }
    });
  });
}

// ── SHOT TRACKER ──
function renderShots() {
  const shots     = loadShots();
  const toggle    = document.getElementById('shot-toggle');
  const logEl     = document.getElementById('shot-log');
  const emptyEl   = document.getElementById('shot-log-empty');
  const nextLabel = document.getElementById('shot-next-label');

  // determine this week's Sunday
  const sunday = isSunday() ? todayISO() : thisSunday();
  const alreadyLogged = shots.some(s => s.date === sunday);

  toggle.checked = alreadyLogged;

  // label
  if (isSunday()) {
    nextLabel.textContent = alreadyLogged ? 'Done today ✓' : 'Today';
  } else {
    const d = new Date(nextSunday() + 'T12:00:00');
    nextLabel.textContent = `Next: ${formatDate(nextSunday())}`;
  }

  // log
  const recent = [...shots].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 8);
  if (!recent.length) {
    if (emptyEl) emptyEl.style.display = 'block';
    logEl.querySelectorAll('.shot-row').forEach(r => r.remove());
    return;
  }
  if (emptyEl) emptyEl.style.display = 'none';

  // remove old rows
  logEl.querySelectorAll('.shot-row').forEach(r => r.remove());
  recent.forEach(s => {
    const row = document.createElement('div');
    row.className = 'shot-row';
    row.innerHTML = `<span>${formatDate(s.date)}</span><span class="shot-check">✓</span>`;
    logEl.appendChild(row);
  });
}

// ── RENDER ALL ──
function renderAll() {
  const entries = loadEntries();
  renderStats(entries);
  renderChart(entries);
  renderHistory(entries);
  renderShots();
}

// ── MOTIVATION PICKER ──
let selectedMood = null;

document.querySelectorAll('.motivation-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.motivation-btn').forEach(b => {
      b.classList.remove('selected-happy', 'selected-neutral', 'selected-sad');
    });
    selectedMood = btn.dataset.value;
    btn.classList.add(`selected-${selectedMood}`);
  });
});

// ── LOG FORM ──
document.getElementById('input-date').value = todayISO();

document.getElementById('btn-log').addEventListener('click', () => {
  const dateVal   = document.getElementById('input-date').value;
  const weightVal = parseFloat(document.getElementById('input-weight').value);
  const noteVal   = document.getElementById('input-note').value.trim();

  if (!dateVal) { showToast('Please enter a date'); return; }
  if (isNaN(weightVal) || weightVal <= 0) { showToast('Please enter a valid weight'); return; }

  const entries = loadEntries();
  entries.push({ date: dateVal, weight: weightVal, note: noteVal, mood: selectedMood });
  saveEntries(entries);

  document.getElementById('input-weight').value = '';
  document.getElementById('input-note').value   = '';
  selectedMood = null;
  document.querySelectorAll('.motivation-btn').forEach(b => {
    b.classList.remove('selected-happy', 'selected-neutral', 'selected-sad');
  });

  renderAll();
  scheduleSave();
  showToast('Weigh-in logged');
});

// ── SHOT TOGGLE ──
document.getElementById('shot-toggle').addEventListener('change', function() {
  const sunday = isSunday() ? todayISO() : thisSunday();
  let shots    = loadShots();

  if (this.checked) {
    if (!shots.some(s => s.date === sunday)) {
      shots.push({ date: sunday });
      saveShots(shots);
      scheduleSave();
      showToast('Shot logged ✓');
    }
  } else {
    shots = shots.filter(s => s.date !== sunday);
    saveShots(shots);
    scheduleSave();
    showToast('Shot removed');
  }

  renderShots();
});

// ── GOOGLE DRIVE SYNC ──────────────────────────────────────────────────────
const CONFIG = {
  CLIENT_ID: '714545608495-qjrpqic57gi549kh9nfhpl53shlf78s8.apps.googleusercontent.com',
  API_KEY:   'AIzaSyC0mBVjHBEc2KsBfRodnArfcqoO1BZ1qZI',
};
const DRIVE_FILENAME = 'steady-data.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient, driveFileId = null, saveTimer = null, gapiReady = false, gsiReady = false;
const configOk = CONFIG.CLIENT_ID !== 'YOUR_CLIENT_ID' && CONFIG.API_KEY !== 'YOUR_API_KEY';

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: CONFIG.API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    gapiReady = true; maybeInitGSI();
  });
}
function maybeInitGSI() {
  if (!configOk) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('error', 'Auth error: ' + resp.error); return; }
      setSyncStatus('saving', 'Signed in — loading data…');
      await findOrCreateFile(); await loadFromDrive();
    }
  });
  gsiReady = true;
  const tok = sessionStorage.getItem('steady_drive_token');
  if (tok) { gapi.client.setToken(JSON.parse(tok)); findOrCreateFile().then(loadFromDrive); }
}
function signIn() {
  if (!configOk) { alert('Add Google Cloud credentials to the CONFIG block first.'); return; }
  if (!gapiReady || !gsiReady) { alert('Google APIs still loading — try again.'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}
function signOut() {
  const t = gapi.client.getToken();
  if (t) google.accounts.oauth2.revoke(t.access_token, () => {});
  gapi.client.setToken(null);
  sessionStorage.removeItem('steady_drive_token');
  driveFileId = null;
  setSyncStatus('disconnected', 'Not connected');
  document.getElementById('btn-signin').style.display = '';
  document.getElementById('btn-signout').style.display = 'none';
}
async function findOrCreateFile() {
  const token = gapi.client.getToken();
  const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D'${DRIVE_FILENAME}'%20and%20trashed%3Dfalse&fields=files(id,name)`, { headers: { 'Authorization': 'Bearer ' + token.access_token } });
  const sd = await sr.json(); const files = sd.files || [];
  if (files.length > 0) { driveFileId = files[0].id; }
  else {
    const cr = await fetch('https://www.googleapis.com/drive/v3/files?fields=id', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token.access_token, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: DRIVE_FILENAME, mimeType: 'application/json' }) });
    driveFileId = (await cr.json()).id;
  }
  sessionStorage.setItem('steady_drive_token', JSON.stringify(gapi.client.getToken()));
  document.getElementById('btn-signin').style.display = 'none';
  document.getElementById('btn-signout').style.display = '';
}
async function loadFromDrive() {
  if (!driveFileId) return;
  setSyncStatus('saving', 'Loading from Drive…');
  try {
    const token = gapi.client.getToken();
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, { headers: { 'Authorization': 'Bearer ' + token.access_token } });
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    if (text && text.trim().startsWith('{')) {
      const data = JSON.parse(text);
      if (data.entries) localStorage.setItem(STORAGE_KEY, JSON.stringify(data.entries));
      if (data.shots)   localStorage.setItem(SHOTS_STORAGE_KEY, JSON.stringify(data.shots));
      renderAll();
    }
    setSyncStatus('connected', 'Synced with Google Drive');
  } catch(e) { await saveToDrive(); }
}
async function saveToDrive() {
  if (!driveFileId) return;
  setSyncStatus('saving', 'Saving…');
  try {
    const token = gapi.client.getToken();
    const payload = { entries: loadEntries(), shots: loadShots() };
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token.access_token, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    setSyncStatus('connected', 'Saved — ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    sessionStorage.setItem('steady_drive_token', JSON.stringify(gapi.client.getToken()));
  } catch(e) { setSyncStatus('error', 'Save failed'); }
}
function scheduleSave() { if (!driveFileId) return; clearTimeout(saveTimer); saveTimer = setTimeout(saveToDrive, 1200); }
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  document.getElementById('sync-label').textContent = label;
  dot.className = 'sync-dot';
  if (state === 'connected') dot.classList.add('connected');
  else if (state === 'saving') dot.classList.add('saving');
  else if (state === 'error') dot.classList.add('error');
}
function resetLocalData() {
  if (!confirm('Clear cached data and reload?')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SHOTS_STORAGE_KEY);
  location.reload();
}

window.addEventListener('resize', () => {
  const entries = loadEntries();
  renderChart(entries);
});
</script>
